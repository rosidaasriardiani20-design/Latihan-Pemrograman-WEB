<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <title>Rekomendasi Lagu</title>
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>
        
        <header>
            <h1>🎵 Rekomendasi Lagu</h1>
            <p>Silakan isi form untuk merekomendasikan lagu</p>
        </header>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="page2.html">Rekomendasi Lagu</a>
        </nav>
        
        <main class="container">
            
            <section class="card">
                
                <h2>Form Rekomendasi Lagu</h2>
                <form>
                    <label>Nama:</label><br>
                    <input type="text" required><br><br>
                    
                    <label>Email:</label><br>
                    <input type="email" required><br><br>
                    
                    <label>Judul Lagu:</label><br>
                    <input type="text" required><br><br>
                    
                    <label>Tanggal:</label><br>
                    <input type="date"><br><br>
                    
                    <label>Rating Lagu (1-10):</label><br>
                    <input type="number" min="1" max="10"><br><br>
                    
                    <button type="submit">Kirim</button>
                
                </form>
            </section>
        
        </main>
        
        <footer>
            <p>Terima kasih sudah mengunjungi website ini 🎧</p>
        </footer>
    
    </body>
    </html>
